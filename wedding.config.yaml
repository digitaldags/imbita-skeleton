faq:
  - question: Where should I park?
    answer: Complimentary parking is available at both venues. Please follow the signs upon arrival.
  - question: Will the ceremony be outdoors?
    answer: The ceremony will be held inside St. Michael's Chapel. The cocktail hour will be outdoors, weather permitting.
  - question: Can we take photos during the ceremony?
    answer: We kindly ask that you keep phones and cameras away during the ceremony so everyone can be fully present. Our photographer will capture every moment!
  - question: Are kids welcome?
    answer: We love your little ones! However, this is an adults-only event. We hope this gives you a chance to enjoy a night out.
  - question: Can we bring a plus-one?
    answer: Due to venue capacity, we can only accommodate guests listed on the invitation. Please reach out if you have any questions.
  - question: Do we really need to RSVP?
    answer: Yes, please! RSVPs help us finalize the headcount for catering and seating. We'd hate to miss you.
  - question: What if I have dietary restrictions?
    answer: Please note any dietary restrictions when you RSVP and we will do our best to accommodate you.
  - question: When should I arrive?
    answer: The ceremony begins at 3:00 PM. Please plan to arrive by 2:45 PM so we can start on time.


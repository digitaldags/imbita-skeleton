services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* must be available at build time (baked into client bundle).
        # All other vars are injected at runtime via env_file below.
        NEXT_PUBLIC_WEDDING_DATE: ${NEXT_PUBLIC_WEDDING_DATE}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
